name: shell-checks

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck ripgrep

      - name: Shell syntax check
        run: |
          mapfile -t shell_files < <(
            printf '%s\n' mkconfig.sh
            rg --files scripts tests/smoke -g '*.sh'
          )
          printf 'syntax-check %s\n' "${shell_files[@]}"
          bash -n "${shell_files[@]}"

      - name: ShellCheck
        run: |
          mapfile -t shell_files < <(
            printf '%s\n' mkconfig.sh
            rg --files scripts tests/smoke -g '*.sh'
          )
          printf 'shellcheck %s\n' "${shell_files[@]}"
          shellcheck -S error "${shell_files[@]}"

      - name: Smoke checks
        run: ./tests/smoke/run.sh --profile both
