name: shell-checks

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck ripgrep

      - name: Shell syntax check
        run: |
          bash -n mkconfig.sh
          bash -n scripts/build-profile.sh
          bash -n scripts/mkconfig-tui.sh
          bash -n scripts/prune-isos.sh
          bash -n scripts/setup-github-remote.sh
          bash -n tests/smoke/run.sh
          bash -n tests/smoke/iso-rootfs-check.sh
          bash -n tests/smoke/boot-qemu.sh

      - name: ShellCheck
        run: |
          shellcheck mkconfig.sh scripts/build-profile.sh scripts/mkconfig-tui.sh scripts/prune-isos.sh scripts/setup-github-remote.sh tests/smoke/run.sh tests/smoke/iso-rootfs-check.sh tests/smoke/boot-qemu.sh

      - name: Smoke checks
        run: ./tests/smoke/run.sh --profile both
