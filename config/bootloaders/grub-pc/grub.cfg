# Theme and Font Configuration
if loadfont /boot/grub/unicode.pf2 ; then
   set gfxmode=auto
   set gfxpayload=keep
   insmod video_bochs
   insmod video_cirrus
   insmod all_video
fi

insmod gfxterm
insmod png
terminal_output gfxterm

# Audio feedback for accessibility
insmod play
play 960 440 1 0 4 440 1

# Color scheme configuration
# Reference: GNU GRUB manual
set color_normal=black/white
set color_highlight=brown/white
set menu_color_normal=black/white
set menu_color_highlight=brown/white

# Core GRUB modules
insmod gzio
insmod part_gpt
insmod ext2

# Menu Configuration
set default="0"
set timeout=5

# Standard Live Boot
@LINUX_LIVE@

# Memtest (if available)
if @ENABLE_MEMTEST@; then
   source /boot/grub/memtest.cfg
fi

# UEFI Firmware Setup Option
if [ "${grub_platform}" = "efi" ]; then
   menuentry "UEFI Firmware Settings" {
       fwsetup
   }
fi
