# Generalized public configuration example.
# Copy to ygg.local.toml (gitignored).

build_profile = "both"            # server | kde | both
enable_qemu_smoke = true
with_nvidia = false
with_lts = false

setup_mode = "recommended"        # recommended
apt_proxy_mode = "off"            # off | explicit | host
infisical_boot_mode = "disabled"  # disabled | container
infisical_container_name = "infisical"
embed_ssh_keys = true
ssh_authorized_keys_file = "/root/.ssh/authorized_keys"
ssh_host_keys_dir = ""

hostname = "yggdrasil"
net_mode = "dhcp"                 # dhcp | static
lxc_parent_if = "eno1"
macvlan_cidr = "10.10.0.250/24"
macvlan_route = "10.10.0.0/24"

# Used when net_mode = "static"
static_iface = "eno1"
static_ip = ""
static_gateway = ""
static_dns = "1.1.1.1 8.8.8.8"

apt_http_proxy = ""
apt_https_proxy = ""
apt_proxy_bypass_host = ""

enable_intel_arc_sriov = false
intel_arc_sriov_release = "2026.03.05"
intel_arc_sriov_vf_count = 7
intel_arc_sriov_pf_pci = ""
intel_arc_sriov_device_id = "0x56a0"
intel_arc_sriov_bind_vfs = "vfio-pci"
